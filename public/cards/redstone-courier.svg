<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 960" role="img" aria-labelledby="title">
  <title id="title">Redstone Courier card front</title>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9b2d3a"/>
      <stop offset="1" stop-color="#13070a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="960" rx="44" fill="#13070a"/>
  <rect x="24" y="24" width="592" height="912" rx="34" fill="url(#bg)"/>
  <rect x="70" y="72" width="500" height="630" rx="28" fill="#210c10" stroke="#ff7888" stroke-opacity=".44" stroke-width="6"/>
  <g filter="url(#glow)" stroke="#ff4f64" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M112 536h132l64-112 70 164 62-236 88 184"/>
    <path d="M180 250h106l54 84h116"/>
    <path d="M150 648h344"/>
  </g>
  <g fill="#ffe1e5">
    <circle cx="180" cy="250" r="32"/>
    <circle cx="456" cy="334" r="32"/>
    <circle cx="112" cy="536" r="28"/>
    <circle cx="528" cy="536" r="28"/>
  </g>
  <path d="M112 760h416" stroke="#ff97a4" stroke-width="4" stroke-linecap="round" opacity=".55"/>
  <text x="320" y="808" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="800">Redstone</text>
  <text x="320" y="858" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="800">Courier</text>
  <text x="320" y="900" text-anchor="middle" fill="#ffb2bc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">UNCOMMON</text>
</svg>
